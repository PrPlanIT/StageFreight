#
# Universal lifecycle transport. One skeleton for all repo modes.
# StageFreight resolves modality from lifecycle.mode in .stagefreight.yml.

trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: ubuntu-latest

resources:
  containers:
    - container: ci
      image: registry.example.com/acme/stagefreight:latest-dev

stages:
  - stage: audition
    dependsOn: []
    jobs:
      - job: audition
        container: ci
        continueOnError: true
        variables:
          DOCKER_HOST: tcp://localhost:2375
        steps:
          - checkout: self
            fetchDepth: 0
          - script: |
              export SF_CI_PROVIDER=azuredevops
              export SF_CI_EVENT="$(Build.Reason)"
              export SF_CI_BRANCH="$(Build.SourceBranchName)"
              export SF_CI_SHA="$(Build.SourceVersion)"
              export SF_CI_REPO_URL="$(Build.Repository.Uri)"
              export SF_CI_PIPELINE_ID="$(Build.BuildId)"
              export SF_CI_WORKSPACE="$(Build.SourcesDirectory)"
              stagefreight ci run audition
            displayName: audition
          - publish: .stagefreight/
            artifact: audition
  - stage: perform
    dependsOn: [audition]
    jobs:
      - job: perform
        container: ci
        pool:
          demands:
            - self-hosted
            - docker
        variables:
          DOCKER_HOST: tcp://localhost:2375
        steps:
          - checkout: self
            fetchDepth: 0
          # OIDC: wire STAGEFREIGHT_OIDC via an Azure service connection / workload identity federation.
          - download: current
            artifact: audition
          - script: |
              export SF_CI_PROVIDER=azuredevops
              export SF_CI_EVENT="$(Build.Reason)"
              export SF_CI_BRANCH="$(Build.SourceBranchName)"
              export SF_CI_SHA="$(Build.SourceVersion)"
              export SF_CI_REPO_URL="$(Build.Repository.Uri)"
              export SF_CI_PIPELINE_ID="$(Build.BuildId)"
              export SF_CI_WORKSPACE="$(Build.SourcesDirectory)"
              stagefreight ci run perform
            displayName: perform
          - publish: .stagefreight/
            artifact: perform
  - stage: review
    dependsOn: [perform]
    jobs:
      - job: review
        container: ci
        continueOnError: true
        variables:
          DOCKER_HOST: tcp://localhost:2375
        steps:
          - checkout: self
          - download: current
            artifact: perform
          - script: |
              export SF_CI_PROVIDER=azuredevops
              export SF_CI_EVENT="$(Build.Reason)"
              export SF_CI_BRANCH="$(Build.SourceBranchName)"
              export SF_CI_SHA="$(Build.SourceVersion)"
              export SF_CI_REPO_URL="$(Build.Repository.Uri)"
              export SF_CI_PIPELINE_ID="$(Build.BuildId)"
              export SF_CI_WORKSPACE="$(Build.SourcesDirectory)"
              stagefreight ci run review
            displayName: review
          - publish: .stagefreight/security/
            artifact: review
  - stage: publish
    dependsOn: [perform, review]
    jobs:
      - job: publish
        container: ci
        continueOnError: true
        steps:
          - checkout: self
            fetchDepth: 0
          - download: current
            artifact: perform
          - download: current
            artifact: review
          - script: |
              export SF_CI_PROVIDER=azuredevops
              export SF_CI_EVENT="$(Build.Reason)"
              export SF_CI_BRANCH="$(Build.SourceBranchName)"
              export SF_CI_SHA="$(Build.SourceVersion)"
              export SF_CI_REPO_URL="$(Build.Repository.Uri)"
              export SF_CI_PIPELINE_ID="$(Build.BuildId)"
              export SF_CI_WORKSPACE="$(Build.SourcesDirectory)"
              stagefreight ci run publish
            displayName: publish
  - stage: narrate
    dependsOn: [perform, publish]
    condition: always()
    jobs:
      - job: narrate
        container: ci
        continueOnError: true
        steps:
          - checkout: self
            fetchDepth: 0
          - download: current
