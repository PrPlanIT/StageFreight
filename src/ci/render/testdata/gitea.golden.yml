# stagefreight-skeleton: universal
# provider: gitea
# supports: audition, perform, review, publish, narrate
#
# GENERATED BY STAGEFREIGHT — DO NOT EDIT
# Regenerate: stagefreight ci render gitea --write
#
# Universal lifecycle transport. One skeleton for all repo modes.
# StageFreight resolves modality from lifecycle.mode in .stagefreight.yml.

name: stagefreight

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: stagefreight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audition:
    runs-on: ubuntu-latest
    container:
      image: registry.example.com/acme/stagefreight:latest-dev
    continue-on-error: true
    services:
      dind:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: stagefreight-context
        run: |
          {
            echo "SF_CI_PROVIDER=gitea"
            echo "SF_CI_EVENT=${{ github.event_name }}"
            echo "SF_CI_BRANCH=${{ github.ref_name }}"
            echo "SF_CI_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}"
            echo "SF_CI_SHA=${{ github.sha }}"
            echo "SF_CI_DEFAULT_BRANCH=${{ github.event.repository.default_branch }}"
            echo "SF_CI_REPO_URL=${{ github.server_url }}/${{ github.repository }}"
            echo "SF_CI_WORKSPACE=$PWD"
            echo "SF_CI_PIPELINE_ID=${{ github.run_id }}"
          } >> "$GITHUB_ENV"
      - name: audition
        env:
          DOCKER_HOST: tcp://dind:2376
          DOCKER_TLS_VERIFY: "1"
          DOCKER_CERT_PATH: /certs/client
        run: |
          stagefreight ci run audition
      - uses: actions/upload-artifact@v4
        with:
          name: audition
          path: |
            .stagefreight/
          retention-days: 7

  perform:
    runs-on: [self-hosted, docker]
    container:
      image: registry.example.com/acme/stagefreight:latest-dev
    needs: [audition]
    permissions:
      contents: read
      id-token: write
    services:
      dind:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: stagefreight-oidc
        run: |
          token=$(wget -qO- --header="Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=stagefreight" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p')
          echo "STAGEFREIGHT_OIDC=$token" >> "$GITHUB_ENV"
      - name: stagefreight-context
        run: |
          {
            echo "SF_CI_PROVIDER=gitea"
            echo "SF_CI_EVENT=${{ github.event_name }}"
            echo "SF_CI_BRANCH=${{ github.ref_name }}"
            echo "SF_CI_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}"
            echo "SF_CI_SHA=${{ github.sha }}"
            echo "SF_CI_DEFAULT_BRANCH=${{ github.event.repository.default_branch }}"
            echo "SF_CI_REPO_URL=${{ github.server_url }}/${{ github.repository }}"
            echo "SF_CI_WORKSPACE=$PWD"
            echo "SF_CI_PIPELINE_ID=${{ github.run_id }}"
          } >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: audition
          path: .
      - name: perform
        env:
          DOCKER_HOST: tcp://dind:2376
          DOCKER_TLS_VERIFY: "1"
          DOCKER_CERT_PATH: /certs/client
        run: |
          stagefreight ci run perform
      - uses: actions/upload-artifact@v4
        with:
          name: perform
          path: |
            .stagefreight/
          retention-days: 1

  review:
    runs-on: ubuntu-latest
    container:
      image: registry.example.com/acme/stagefreight:latest-dev
    needs: [perform]
    continue-on-error: true
    services:
      dind:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: stagefreight-context
        run: |
          {
            echo "SF_CI_PROVIDER=gitea"
            echo "SF_CI_EVENT=${{ github.event_name }}"
            echo "SF_CI_BRANCH=${{ github.ref_name }}"
            echo "SF_CI_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}"
            echo "SF_CI_SHA=${{ github.sha }}"
            echo "SF_CI_DEFAULT_BRANCH=${{ github.event.repository.default_branch }}"
            echo "SF_CI_REPO_URL=${{ github.server_url }}/${{ github.repository }}"
            echo "SF_CI_WORKSPACE=$PWD"
            echo "SF_CI_PIPELINE_ID=${{ github.run_id }}"
          } >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: perform
          path: .
      - name: review
        env:
          DOCKER_HOST: tcp://dind:2376
          DOCKER_TLS_VERIFY: "1"
          DOCKER_CERT_PATH: /certs/client
        run: |
          stagefreight ci run review
      - uses: actions/upload-artifact@v4
        with:
          name: review
          path: |
            .stagefreight/security/
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    container:
      image: registry.example.com/acme/stagefreight:latest-dev
    needs: [perform, review]
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: stagefreight-context
        run: |
          {
            echo "SF_CI_PROVIDER=gitea"
            echo "SF_CI_EVENT=${{ github.event_name }}"
            echo "SF_CI_BRANCH=${{ github.ref_name }}"
            echo "SF_CI_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}"
            echo "SF_CI_SHA=${{ github.sha }}"
            echo "SF_CI_DEFAULT_BRANCH=${{ github.event.repository.default_branch }}"
            echo "SF_CI_REPO_URL=${{ github.server_url }}/${{ github.repository }}"
            echo "SF_CI_WORKSPACE=$PWD"
            echo "SF_CI_PIPELINE_ID=${{ github.run_id }}"
          } >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: perform
          path: .
      - uses: actions/download-artifact@v4
        with:
          name: review
          path: .
      - name: publish
        env:
          GITEA_USER: ${{ github.actor }}
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          stagefreight ci run publish

  narrate:
    runs-on: ubuntu-latest
    container:
      image: registry.example.com/acme/stagefreight:latest-dev
    needs: [perform, publish]
    if: ${{ always() }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: stagefreight-context
        run: |
          {
            echo "SF_CI_PROVIDER=gitea"
            echo "SF_CI_EVENT=${{ github.event_name }}"
            echo "SF_CI_BRANCH=${{ github.ref_name }}"
            echo "SF_CI_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}"
            echo "SF_CI_SHA=${{ github.sha }}"
            echo "SF_CI_DEFAULT_BRANCH=${{ github.event.repository.default_branch }}"
            echo "SF_CI_REPO_URL=${{ github.server_url }}/${{ github.repository }}"
            echo "SF_CI_WORKSPACE=$PWD"
            echo "SF_CI_PIPELINE_ID=${{ github.run_id }}"
          } >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: perform
          path: .
      - name: narrate
        run: |
          stagefreight ci run narrate
