# StageFreight GitLab CI skeleton
# Behavior is configured in .stagefreight.yml, not here.
# This file translates GitLab CI context into StageFreight's normalized contract.

stages:
  - build
  - deps
  - security
  - docs
  - release

workflow:
  auto_cancel:
    on_new_commit: interruptible

.stagefreight-context: &sf-context
  - export SF_CI_PROVIDER=gitlab
  - export SF_CI_EVENT="${CI_PIPELINE_SOURCE}"
  - export SF_CI_BRANCH="${CI_COMMIT_BRANCH}"
  - export SF_CI_TAG="${CI_COMMIT_TAG}"
  - export SF_CI_SHA="${CI_COMMIT_SHA}"
  - export SF_CI_DEFAULT_BRANCH="${CI_DEFAULT_BRANCH}"
  - export SF_CI_REPO_URL="${CI_PROJECT_URL}"
  - export SF_CI_WORKSPACE="$PWD"

default:
  image: docker.jcr.pcfae.com/prplanit/stagefreight:latest-dev
  interruptible: true

build-image:
  stage: build
  services:
    - name: docker.jcr.pcfae.com/docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_CERTDIR: "/certs"
  artifacts:
    paths: [.stagefreight/]
    reports:
      junit: .stagefreight/reports/lint.xml
    expire_in: 2 hours
  before_script:
    - *sf-context
    - docker context create tls-context --docker "host=$DOCKER_HOST,ca=$DOCKER_CERT_PATH/ca.pem,cert=$DOCKER_CERT_PATH/cert.pem,key=$DOCKER_CERT_PATH/key.pem"
    - docker buildx create --name stagefreight-builder --use tls-context
  script:
    # Bootstrap: use direct commands until latest-dev image includes `ci run`.
    # Next pipeline after this build succeeds can switch to `stagefreight ci run build`.
    - stagefreight docker build
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

dependency-update:
  stage: deps
  needs: [build-image]
  variables:
    GIT_DEPTH: 0
  before_script:
    - *sf-context
  script:
    - stagefreight dependency update
  artifacts:
    paths: [.stagefreight/deps/]
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
  allow_failure: true

security-scan:
  stage: security
  needs: [build-image]
  services:
    - name: docker.jcr.pcfae.com/docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_CERTDIR: "/certs"
  artifacts:
    paths: [.stagefreight/security/]
    expire_in: 1 week
  before_script:
    - *sf-context
    - docker context create tls-context --docker "host=$DOCKER_HOST,ca=$DOCKER_CERT_PATH/ca.pem,cert=$DOCKER_CERT_PATH/cert.pem,key=$DOCKER_CERT_PATH/key.pem"
    - docker buildx create --name security-scanner --use tls-context
  script:
    - stagefreight security scan
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
  allow_failure: true

generate-docs:
  stage: docs
  needs: [build-image]
  variables:
    GIT_DEPTH: 0
    BUILD_STATUS: "passing"
    BUILD_DATE: "$CI_COMMIT_TIMESTAMP"
  before_script:
    - *sf-context
  script:
    - stagefreight docs run
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
  allow_failure: true

create-release:
  stage: release
  variables:
    GIT_DEPTH: 0
  needs:
    - build-image
    - job: security-scan
      optional: true
    - job: generate-docs
      optional: true
  before_script:
    - *sf-context
  script:
    - stagefreight release create --tag "$CI_COMMIT_TAG"
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
  allow_failure: true
