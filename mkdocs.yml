# StageFreight documentation site — built with MkDocs Material.
#
# Local live preview (no toolchain, no pipeline):
#   docker run --rm -it -p 8000:8000 -v "$PWD":/docs \
#     docker.io/squidfunk/mkdocs-material:9 serve -a 0.0.0.0:8000
#
# Built + deployed by StageFreight itself (see .stagefreight.yml docs-site build + docs
# pages target) to https://stagefreight.prplanit.com on release tags.

site_name: StageFreight
site_url: https://stagefreight.prplanit.com
site_description: >-
  A declarative lifecycle runtime — GitOps, Kubernetes, Docker, and CI ecosystems
  from one manifest.
repo_name: PrPlanIT/StageFreight
repo_url: https://github.com/PrPlanIT/StageFreight
edit_uri: edit/main/docs/
copyright: Copyright &copy; PrPlanIT

docs_dir: docs

# Never shipped to the site (kept in-repo for maintainers/contributors):
#   architecture/plans/  → design RFCs + internal planning (RoadMap, To-Do, audits)
# Temporarily excluded until Pass 2 merges/places them (feature docs → bucket pages;
# CI/DependencyUpdate/Package-Distribution/Props get proper homes):
exclude_docs: |
  architecture/plans/
  config/Docker.md
  config/Release.md
  config/Narrator.md
  config/Props.md
  config/Linter.md
  config/Security.md
  config/aspirational/README.md
  architecture/CI.md
  architecture/DependencyUpdate.md
  architecture/Package-Distribution.md

theme:
  name: material
  logo: assets/logo-192.png
  favicon: assets/logo-192.png
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

# ── Navigation ──────────────────────────────────────────────────────────
nav:
  - Home: README.md
  - Quick Start: quickstart.md
  - Configuration:
      - Overview: config/index.md
      - Identity & Connectivity: config/identity.md
      - Builds & Tests: config/builds.md
      - Targets: config/targets.md
      - Narrate: config/narrate.md
      - Lint: config/lint.md
      - Policy: config/policy.md
      - Lifecycle Modes: config/lifecycle.md
      - Signing: config/signing.md
      - Full Schema Reference: reference/Config.md
  - Integrations:
      - Overview: integrations/index.md
      - Set-up: integrations/setup.md
      - GitLab: integrations/gitlab/README.md
      - GitLab Components: integrations/gitlab/GitLab-Components.md
      - Build Runner: integrations/gitlab/runner/docker/gitlab-runner-builds.md
      - GitOps Runner: integrations/gitlab/runner/docker/gitlab-runner-gitops-k8s.md
      - Azure DevOps: integrations/azuredevops/README.md
  - CLI Reference: reference/CLI.md
  - Features: features.md
  - How It Works:
      - Overview: architecture/index.md
      - Pipeline Flow: architecture/pipeline-flow.md
      - Invariants: architecture/invariants.md
      - Boundaries: architecture/boundaries.md
      - CI Render: architecture/ci-render.md
      - Content Store Lifecycle: architecture/content-store-lifecycle.md
      - Perform Build Contributors: architecture/perform-build-contributors.md
      - Persistence & Identity: architecture/persistence-identity.md
      - Runtime Spec: architecture/runtime-spec.md
  - Screenshots: screenshots.md
  - About:
      - Known Issues: known-issues.md
      - Licensing: licensing.md
