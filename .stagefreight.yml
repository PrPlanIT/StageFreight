version: 1

ci:
  # Runtime pull location: the docker.io pull-through mirror serving
  # docker.io/prplanit/stagefreight:latest-dev (where the narrate image lands).
  image: docker.cr.pcfae.com/prplanit/stagefreight:latest-dev

vars:
  org: prplanit
  github_org: PrPlanIT
  gitlab_group: PrPlanIT
  repo: stagefreight
  github_repo: StageFreight

git:                                     # interpret the ref → named branch/tag patterns + the versions they imply (was matchers + versioning)
  branches:
    main: "^main$"
  tags:                                  # id → {pattern} (was versioning.tag_sources)
    stable:     { pattern: "^v?\\d+\\.\\d+\\.\\d+$" }
    prerelease: { pattern: "^v?\\d+\\.\\d+\\.\\d+-.+" }
  versioning:                            # derivation rules that consume the patterns above
    branch_builds:
      default: { base_from: [stable], format: "{base}-dev+{sha}" }
    no_lineage: { mode: error }

builds:
  stagefreight:
    kind: docker
    build_mode: crucible
    platforms: [linux/amd64]

  # Reference docs are a build: generate them from THIS commit's binary, not a stale one.
  # stage recycles the freshly-built stagefreight-bin into the workspace as ./stagefreight
  # (same mechanism as a docker build's stage:), so docs reflect the CLI + config being
  # shipped — never the previous release's schema — with no recompile. No image is pinned:
  # kind: command defaults to ci.image, which is just the sandbox — we execute the staged
  # static binary, not whatever the image ships. `worktree: true` lands the tree at the
  # output's source path (docs/assets/modules) at the start of Narrate, where the narrator include
  # items assemble it into docs/reference; `{output}` names the path once. This is the
  # general shape any project uses: build your tool, stage it, run it.
  reference:
    kind: command
    stage:
      from: stagefreight-bin
      as: stagefreight
    command: [./stagefreight, docs, generate, --output-dir, "{output}"]
    outputs:
      - { type: tree, source: docs/assets/modules, worktree: true }

  stagefreight-bin:
    kind: binary
    builder: go
    from: ./src/cli
    output: stagefreight
    env: { CGO_ENABLED: "0" }
    # No -tags banner_art: the fancy ASCII banner needs a generated, gitignored
    # file (go generate ./src/output) that the Dockerfile produces but the binary
    # build can't. The stub gives a text banner. Version is embedded via ldflags so
    # downloaded binaries report the real version (not "dev").
    args:
      - "-ldflags"
      - "-s -w -X github.com/PrPlanIT/StageFreight/src/version.Version={version} -X github.com/PrPlanIT/StageFreight/src/version.Commit={sha} -X github.com/PrPlanIT/StageFreight/src/version.BuildDate={date}"
    platforms: [linux/amd64, linux/arm64]

  # Documentation site: build the MkDocs Material site from docs/ into a `site/` tree
  # that the `docs` pages target deploys. The mkdocs-material image ships an
  # ENTRYPOINT ["mkdocs"], which collides with the engine's `sh -c` invocation, so we
  # pip-install into a plain python image instead. Uses the committed, generated
  # reference under docs/reference + docs/assets/modules (kept fresh by the `reference` build).
  docs-site:
    kind: command
    image: docker.io/library/python:3.12-slim
    command: "pip install --quiet --root-user-action=ignore mkdocs-material && mkdocs build --strict --site-dir {output}"
    outputs:
      - { type: tree, source: site }

forges:
  gitlab:
    provider: gitlab
    url: "https://gitlab.prplanit.com"
    credentials: GITLAB

  github:
    provider: github
    url: "https://github.com"
    credentials: GITHUB

repos:
  primary:
    forge: gitlab
    project: "{var:gitlab_group}/{var:repo}"
    roles: [primary]
    branches:
      default: main
    worktree: "."

  github-mirror:
    forge: github
    project: "{var:github_org}/{var:github_repo}"
    roles: [mirror, publish-origin]
    sync:                        # facet × scope (see 📦); faithful git mirror (releases NOT synced —
      branches: exact            # they're authored on github via the github-release publish target;
      tags: exact                # a repo gets releases via sync XOR a kind:release target, never both)

registries:
  dockerhub:
    provider: docker
    url: docker.io
    credentials: DOCKER
    default_path: "{var:org}/{var:repo}"

  harbor:
    provider: harbor
    url: cr.pcfae.com
    credentials: HARBOR
    default_path: "{var:org}/{var:repo}"

  # GitHub Container Registry. Path must be lowercase; {var:org}/{var:repo}
  # (prplanit/stagefreight) resolves under the PrPlanIT GitHub org.
  # Auth: GHCR_USER + GHCR_TOKEN (a PAT with write:packages) in CI.
  ghcr:
    provider: ghcr
    url: ghcr.io
    credentials: GHCR
    default_path: "{var:org}/{var:repo}"

publish:                                 # distribute artifacts to their destinations (was targets:); id→target map
  # ── Stable releases → all registries (fans via registry: list) ───
  stable:
    kind: registry
    registry: [dockerhub, ghcr, harbor]
    build: stagefreight
    tags: ["v{version}", "latest"]
    when: { git_tags: [stable], events: [tag] }

  # ── Pre-releases (alpha/beta/rc) → Docker Hub + GHCR ─────────────
  prerelease:
    kind: registry
    registry: [dockerhub, ghcr]
    build: stagefreight
    tags: ["v{version}"]
    when: { git_tags: [prerelease], events: [tag] }

  # ── Dev builds on every commit → Docker Hub + GHCR (retained/pruned) ──
  dev:
    kind: registry
    registry: [dockerhub, ghcr]
    build: stagefreight
    tags: ["dev-{sha:8}", "latest-dev"]
    when: { branches: [main], events: [push] }
    retention:
      keep_last: 6
      protect: ["latest-dev"]

  # ── Harbor: dev builds (own entry — no retention, unlike dockerhub/ghcr dev) ──
  harbor-dev:
    kind: registry
    registry: harbor
    build: stagefreight
    tags: ["dev-{sha:8}", "latest-dev"]
    when: { branches: [main], events: [push] }

  # ── Harbor: per-branch test builds (Harbor ONLY, never Docker Hub) ──
  # Every non-main branch push crucible-builds to Harbor so a protected branch
  # pipeline can point its CI image at the branch build and let the candidate
  # govern itself end-to-end before merge. The test-* / latest-test-* tag
  # namespace IS the throwaway channel — images carry no release/prerelease flag
  # (that is a forge-release concept, not an image one).
  harbor-test:
    kind: registry
    registry: harbor
    build: stagefreight
    tags: ["test-{branch}-{sha:8}", "latest-test-{branch}"]
    when: { branches: ["!main"], events: [push] }
    retention:
      keep_last: 6
      protect: ["latest-test-{branch}"]

  # ── Docker Hub: README sync ──────────────────────────────────────
  dockerhub-readme:
    kind: docker-readme
    registry: dockerhub
    when: { branches: [main], events: [push, tag] }
    file: "README.md"
    description: "A declarative lifecycle runtime — GitOps, Kubernetes, Docker, and CI ecosystems from one manifest"

  # ── Binary archives: linux amd64/arm64 + SHA256SUMS ──────────────
  # ONE archive recipe, fired on EITHER trigger (when: is an OR-list of condition
  # sets) — {version} differentiates stable (1.2.3) from dev (1.2.3-dev+sha). Feeds
  # both primary-release (stable tag) and dev-release (main push).
  stagefreight-binaries:
    kind: binary-archive
    build: stagefreight-bin
    name: "stagefreight-{version}-{os}-{arch}"
    format: auto
    checksums: true
    when:
      - { git_tags: [stable], events: [tag] }   # feeds primary-release
      - { branches: [main], events: [push] }    # feeds dev-release

  # ── Primary release (rolling git tag aliases + binaries) ─────────
  primary-release:
    kind: release
    type: latest
    repos: [primary]                 # canonical release on the primary forge (gitlab)
    archives: stagefreight-binaries
    aliases: ["v{version}", "latest"]
    when: { git_tags: [stable], events: [tag] }

  # ── GitHub release (authored on the mirror) with binaries ────────
  github-release:
    kind: release
    type: latest
    repos: [github-mirror]           # authored directly on github (was mirror: + sync_release:)
    archives: stagefreight-binaries
    when: { git_tags: [stable], events: [tag] }

  # ── Dev binary release channel (GitLab): rolling latest-dev +
  #    retained immutable dev-{sha8}, pruned like the docker dev images.
  #    Dogfoods the binary release-channel feature. (GitHub mirror dev
  #    projection deferred until mirror-side retention lands.)
  dev-release:
    kind: release
    repos: [primary]                 # canonical dev release on the primary forge (gitlab)
    archives: stagefreight-binaries  # the same one recipe as primary-release (OR-list when:)
    tag: "dev-{sha:8}"
    aliases: ["latest-dev"]
    type: prerelease
    retention:
      keep_last: 6
      protect: ["latest-dev"]
    when: { branches: [main], events: [push] }

  # ── Documentation site → Cloudflare Pages ────────────────────────
  # Deploy the built docs-site tree to stagefreight.prplanit.com on version tags only, so
  # the mkdocs build that generates the site + the Cloudflare deploy run once per release
  # instead of on every main commit — no per-push churn or deploy-budget burn. Cloudflare
  # auto-wires DNS. Credentials: CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID.
  docs:
    kind: pages
    provider: cloudflare
    project: stagefreight
    build: docs-site
    domain: stagefreight.prplanit.com
    when: { git_tags: [stable], events: [tag] }

  # ── Documentation site → GitHub Pages (dogfood, alongside Cloudflare) ──
  # Force-pushes the same docs-site tree to the gh-pages branch of the GitHub mirror,
  # served at https://prplanit.github.io/StageFreight/. No custom domain — Cloudflare
  # owns stagefreight.prplanit.com. Requires GITHUB_TOKEN (contents:write) AND GitHub
  # Pages enabled on the repo with source = gh-pages branch.
  docs-github:
    kind: pages
    provider: github
    project_id: "{var:github_org}/{var:github_repo}"
    credentials: GITHUB
    build: docs-site
    when: { git_tags: [stable], events: [tag] }

build_cache:
  mode: hybrid
  external:
    target: harbor-dev
    path: "cache"
    fallback: "main"
  local:
    # Cap the BuildKit builder cache below the 15GB default — enforced by
    # `buildx prune --keep-storage` after each successful build. The runner's
    # 45GB disk is shared with the toolchain caches, and an uncapped builder cache
    # took it to 100%. NOTE: buildkitd is shared across projects on the runner, so
    # this only holds after a StageFreight build; for a uniform cap, match max_size
    # in the other projects' configs (or lower DefaultBuildCacheConfig).
    retention:
      max_age: "7d"
      max_size: "8GB"

commit:
  default_type: docs
  conventional: true
  backend: git

# Tests run in audition (sibling to lint). The whole repo at gate: perform with
# -race: a failed suite fails audition → withholds the cistate artifact → halts
# perform + downstream (the same gate lint criticals use). git and the C toolchain
# (-race) are realized at TEST TIME via substrate (apk-backed, cached) — the shipped
# image stays git-less / minimal.
test:
  enabled: true
  suites:
    - id: unit
      tool: go
      packages: [./...]
      race: true
      coverage: true
      gate: perform

dependency:
  enabled: true
  output: ".stagefreight/deps"
  scope:
    go_modules: true
    dockerfile_env: true
  commit:
    enabled: true
    type: chore
    message: "update managed dependencies"
    push: true
    skip_ci: false

narrate:
  badges:
    - id: build
      text: build
      value: "{env:BUILD_STATUS}"
      color: auto
      font: monofur
      output: ".stagefreight/badges/build.svg"
      link: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}/-/pipelines"
    - id: license
      text: license
      value: "AGPL-3.0-only"
      color: "#310937"
      font: monofur
      output: ".stagefreight/badges/license.svg"
      link: LICENSE
    - id: release
      text: release
      value: "v{base}"
      color: "#74ecbe"
      font: dejavu-sans
      font_size: 11
      output: ".stagefreight/badges/release.svg"
      link: "https://github.com/{var:github_org}/{var:github_repo}/releases"
    - id: updated
      text: updated
      value: "{env:BUILD_DATE}"
      color: "#236144"
      font: dejavu-sans
      font_size: 11
      output: ".stagefreight/badges/updated.svg"
    - id: pulls
      text: pulls
      value: "{docker.pulls}"
      color: "#1d63ed"
      output: ".stagefreight/badges/pulls.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}"
    - id: release-latest
      text: latest
      value: "v{base}"
      color: "#74ecbe"
      output: ".stagefreight/badges/latest.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest"
    - id: release-updated
      text: updated
      value: "{docker.tag.v{base}.updated}"
      color: "#236144"
      output: ".stagefreight/badges/release-updated.svg"
    - id: release-size
      text: size
      value: "{docker.tag.v{base}.size}"
      color: "#555"
      output: ".stagefreight/badges/release-size.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=v{base}"
    - id: dev-latest
      text: latest-dev
      value: "dev-{sha:8}"
      color: "#3b82f6"
      output: ".stagefreight/badges/latest-dev.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"
    - id: dev-updated
      text: updated
      value: "{docker.tag.latest-dev.updated}"
      color: "#236144"
      output: ".stagefreight/badges/dev-updated.svg"
    - id: dev-size
      text: size
      value: "{docker.tag.latest-dev.size}"
      color: "#555"
      output: ".stagefreight/badges/dev-size.svg"
      link: "https://hub.docker.com/r/{var:org}/{var:repo}/tags?name=latest-dev"
  patches:
    - file: "README.md"
      items:
        - id: badge.build
          kind: badge_ref
          ref: build
          placement:
            between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
            mode: replace
            inline: true

        - id: badge.license
          kind: badge_ref
          ref: license
          placement:
            between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
            mode: replace
            inline: true

        - id: badge.release
          kind: badge_ref
          ref: release
          placement:
            between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
            mode: replace
            inline: true

        - id: badge.updated
          kind: badge_ref
          ref: updated
          placement:
            between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
            mode: replace
            inline: true

        - id: shield.donate
          kind: shield
          placement:
            between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
            mode: replace
            inline: true
          shield: "badge/donate-FF5E5B?logo=ko-fi&logoColor=white"
          link: "https://ko-fi.com/T6T41IT163"

        - id: shield.sponsor
          kind: shield
          placement:
            between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
            mode: replace
            inline: true
          shield: "badge/sponsor-EA4AAA?logo=githubsponsors&logoColor=white"
          link: "https://github.com/sponsors/{var:github_org}"

        # ── Project section (repo health & sources) ─────────────────
        - id: project.github
          kind: shield
          placement:
            between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
            mode: replace
            inline: true
          shield: "badge/GitHub-source-181717?logo=github"
          link: "https://github.com/{var:github_org}/{var:github_repo}"

        - id: project.gitlab
          kind: shield
          placement:
            between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
            mode: replace
            inline: true
          shield: "badge/GitLab-source-FC6D26?logo=gitlab"
          link: "https://gitlab.prplanit.com/{var:gitlab_group}/{var:repo}"

        - id: project.go-report
          kind: props
          type: go-report-card
          placement:
            between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
            mode: replace
            inline: true
          params:
            module: "github.com/{var:github_org}/{var:github_repo}"

        - id: project.go-reference
          kind: props
          type: go-reference
          placement:
            between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
            mode: replace
            inline: true
          params:
            module: "github.com/{var:github_org}/{var:github_repo}"

        - id: project.last-commit
          kind: props
          type: github-last-commit
          placement:
            between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
            mode: replace
            inline: true
          params:
            repo: "{var:github_org}/{var:github_repo}"

        - id: project.issues-open
          kind: props
          type: github-issues-open
          placement:
            between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
            mode: replace
            inline: true
          params:
            repo: "{var:github_org}/{var:github_repo}"

        - id: project.prs-open
          kind: shield
          placement:
            between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
            mode: replace
            inline: true
          shield: "github/issues-pr/{var:github_org}/{var:github_repo}"

        - id: project.contributors
          kind: props
          type: github-contributors
          placement:
            between: ["<!-- sf:project:start -->", "<!-- sf:project:end -->"]
            mode: replace
            inline: true
          params:
            repo: "{var:github_org}/{var:github_repo}"

        # ── Image section (multi-row with breaks) ─────────────────────
        # Row 1: Docker image + pulls
        - id: image.docker
          kind: shield
          placement:
            between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
            mode: replace
          shield: "badge/Docker-{var:org}%2F{var:repo}-2496ED?logo=docker&logoColor=white"
          link: "https://hub.docker.com/r/{var:org}/{var:repo}"

        - id: image.pulls
          kind: badge_ref
          ref: pulls
          placement:
            between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
            mode: replace

        - id: image.break1
          kind: break
          placement:
            between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
            mode: replace

        # Row 2: All tag badges (release + dev)
        - id: image.release-latest
          kind: badge_ref
          ref: release-latest
          placement:
            between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
            mode: replace

        - id: image.release-updated
          kind: badge_ref
          ref: release-updated
          placement:
            between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
            mode: replace

        - id: image.release-size
          kind: badge_ref
          ref: release-size
          placement:
            between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
            mode: replace

        # Dev badges (same row)
        - id: image.dev-latest
          kind: badge_ref
          ref: dev-latest
          placement:
            between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
            mode: replace

        - id: image.dev-updated
          kind: badge_ref
          ref: dev-updated
          placement:
            between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
            mode: replace

        - id: image.dev-size
          kind: badge_ref
          ref: dev-size
          placement:
            between: ["<!-- sf:image:start -->", "<!-- sf:image:end -->"]
            mode: replace

        # ── Image contents (from manifest inventory) ──────────────────
        - id: contents.base
          kind: build-contents
          build: stagefreight
          section: inventories.versions
          renderer: badges
          placement:
            between: ["<!-- sf:contents-base:start -->", "<!-- sf:contents-base:end -->"]
            mode: replace

        - id: contents.apk
          kind: build-contents
          build: stagefreight
          section: inventories.apk
          renderer: badges
          placement:
            between: ["<!-- sf:contents-apk:start -->", "<!-- sf:contents-apk:end -->"]
            mode: replace

    - file: "docs/reference/CLI.md"
      items:
        - id: cli-reference
          kind: include
          path: docs/assets/modules/cli-reference.md
          placement:
            between: ["<!-- sf:cli-reference:start -->", "<!-- sf:cli-reference:end -->"]
            mode: replace

    - file: "docs/reference/Config.md"
      items:
        - id: config-reference
          kind: include
          path: docs/assets/modules/config-reference.md
          placement:
            between: ["<!-- sf:config-reference:start -->", "<!-- sf:config-reference:end -->"]
            mode: replace
  commit:
    type: docs
    message: "refresh generated docs and badges"
    add:
      - "README.md"
      - "docs/assets/modules"
      - "docs/reference"
      - ".stagefreight/badges"
    push: true
    # StageFreight's own docs are project metadata, not build inputs (the image
    # is built from src/ only — README/docs are never copied in), so the docs
    # auto-commit is synchronization output, not new source intent. Marking it
    # skip-ci keeps it from entering the lifecycle and spawning a follow-up
    # pipeline that auto-cancels the narrate which produced it. (Repos that ship docs IN
    # the image — e.g. FAIRER-pages — keep this false: there a docs change is a
    # real build input.) Broader X-StageFreight-Generated-keyed policy is TODO.
    skip_ci: true

lint:
  level: full
  exclude:
    - "*.ttf"
    - "*.png"
    - "*.jpg"
    - "*.ico"
    - "*.woff"
    - "*.woff2"
  modules:
    freshness:
      enabled: true
      options:
        cache_ttl: 300
        sources:
          docker_images: true
          github_releases: true
          go_modules: true
        vulnerability:
          enabled: true
    tabs:
      enabled: true
    # House-style policy (default-off globally): StageFreight values output indirection
    # through the diag/renderer boundary, so it enables direct-output on ITS OWN source.
    direct-output:
      enabled: true
    secrets:
      enabled: true
      exclude:
        - "go.sum"
    conflicts:
      enabled: true
    filesize:
      enabled: true
    unicode:
      enabled: true
      options:
        # Unicode / invisible text defense — see docs/Linter.md § Unicode
        # No allowlist needed: banner art is build-generated with escaped
        # string literals (no raw control bytes in source).
        detect_bidi: true
        detect_zero_width: true
        detect_control_ascii: true

release:
  enabled: true
  security_summary: ".stagefreight/security"
  registry_links: true

security:
  enabled: true
  output: ".stagefreight/security"
  sbom: true
  release_detail: full

toolchains:
  desired:
    trivy:
      version: "0.69.3"
    syft:
      version: "1.42.3"
    grype:
      version: "0.110.0"
    osv-scanner:
      version: "2.3.5"
    cosign:
      version: "3.0.6"
    flux:
      version: "2.8.3"
    kubectl:
      version: "1.34.2"
